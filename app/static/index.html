<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Platform Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.4rem; color: #64748b; margin-bottom: 1.5rem; letter-spacing: .05em; }

    #panel {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: .75rem;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #1e293b;
      font: inherit;
      font-size: .9rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #6366f1; }

    #presets {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    button {
      padding: .45rem .9rem;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #475569;
      font: inherit;
      font-size: .82rem;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    button:hover { border-color: #6366f1; color: #6366f1; }

    #submit-btn {
      padding: .55rem 1.4rem;
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
      font-size: .9rem;
    }
    #submit-btn:hover { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    #submit-btn:disabled { opacity: .4; cursor: default; }

    #stream {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-top: .5rem;
    }

    .evt {
      padding: .6rem .85rem;
      border-radius: 5px;
      font-size: .85rem;
      line-height: 1.5;
      border-left: 3px solid transparent;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .evt-text       { background: #fff;    border-color: #6366f1; color: #1e293b; }
    .evt-tool_call  { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }
    .evt-tool_result{ background: #f0fdf4; border-color: #22c55e; color: #15803d; }
    .evt-done       { background: #f0fdf4; border-color: #16a34a; color: #15803d; font-weight: 600; }
    .evt-error      { background: #fef2f2; border-color: #ef4444; color: #b91c1c; }
    .evt-cancelled  { background: #faf5ff; border-color: #a855f7; color: #7e22ce; font-weight: 600; }
    .evt-status     { color: #94a3b8; font-size: .78rem; font-style: italic; }

    #cancel-btn {
      padding: .55rem 1.4rem;
      background: #fff;
      border-color: #ef4444;
      color: #ef4444;
      font-size: .9rem;
      display: none;
    }
    #cancel-btn:hover { background: #fef2f2; border-color: #dc2626; color: #dc2626; }
  </style>
</head>
<body>
  <h1>Agent Platform — highlight reel</h1>

  <div id="panel">
    <textarea id="input" placeholder="Describe what you want the agent to do…"></textarea>

    <div id="presets">
      <button onclick="preset('What is the current UTC time? Use the get_current_time tool.')">⏱ Current time</button>
      <button onclick="preset('Fetch https://httpbin.org/json using the http_fetch tool and summarise the response.')">🌐 Fetch URL</button>
      <button onclick="preset('Read the file hello.txt using the file_read tool and tell me exactly what it says.')">📄 Read file</button>
    </div>

    <div style="display:flex; gap:.5rem; justify-content:flex-end;">
      <button id="cancel-btn" onclick="cancelRun()">✕ Cancel</button>
      <button id="submit-btn" onclick="submitRun()">▶ Run</button>
    </div>
  </div>

  <div id="stream"></div>

  <script>
    const inputEl   = document.getElementById('input');
    const streamEl  = document.getElementById('stream');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    let activeRunId = null;
    let activeEs    = null;

    function preset(text) { inputEl.value = text; }

    function addEvent(type, html) {
      const div = document.createElement('div');
      div.className = `evt evt-${type}`;
      div.innerHTML = html;
      streamEl.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setRunning(runId, es) {
      activeRunId = runId;
      activeEs    = es;
      submitBtn.disabled  = true;
      cancelBtn.style.display = 'block';
    }

    function setIdle() {
      activeRunId = null;
      activeEs    = null;
      submitBtn.disabled      = false;
      cancelBtn.style.display = 'none';
      cancelBtn.disabled      = false;
    }

    async function cancelRun() {
      if (!activeRunId) return;
      cancelBtn.disabled = true;
      addEvent('status', '⏳ Cancelling…');
      try {
        await fetch(`/runs/${activeRunId}/cancel`, { method: 'POST' });
      } catch (e) {
        addEvent('error', `❌ Cancel failed: ${esc(e.message)}`);
        cancelBtn.disabled = false;
      }
    }

    async function submitRun() {
      const input = inputEl.value.trim();
      if (!input) return;

      streamEl.innerHTML = '';
      submitBtn.disabled = true;
      addEvent('status', '⏳ Submitting…');

      let runId;
      try {
        const res = await fetch('/runs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        ({ id: runId } = await res.json());
      } catch (e) {
        streamEl.innerHTML = '';
        addEvent('error', `❌ Submit failed: ${esc(e.message)}`);
        submitBtn.disabled = false;
        return;
      }

      streamEl.innerHTML = '';
      addEvent('status', `run ${runId}`);

      const es = new EventSource(`/runs/${runId}/events`);
      setRunning(runId, es);

      es.onmessage = (e) => {
        const evt = JSON.parse(e.data);
        if (evt.type === 'text') {
          addEvent('text', esc(evt.text));
        } else if (evt.type === 'tool_call') {
          const args = JSON.stringify(evt.input, null, 2);
          addEvent('tool_call', `🔧 <b>${esc(evt.tool)}</b>\n${esc(args)}`);
        } else if (evt.type === 'tool_result') {
          addEvent('tool_result', `↩ ${esc(evt.output)}`);
        } else if (evt.type === 'done') {
          addEvent('done', `✅ Done`);
          es.close(); setIdle();
        } else if (evt.type === 'error') {
          addEvent('error', `❌ ${esc(evt.error)}`);
          es.close(); setIdle();
        } else if (evt.type === 'cancelled') {
          addEvent('cancelled', `🚫 Cancelled`);
          es.close(); setIdle();
        }
      };

      es.onerror = () => {
        es.close();
        addEvent('error', '❌ Stream disconnected');
        setIdle();
      };
    }
  </script>
</body>
</html>
